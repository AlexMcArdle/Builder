<svg xmlns="http://www.w3.org/2000/svg" width="512" height="256" viewBox="0 0 512 256">
  <defs>
    <!-- Wood plank texture via gradient -->
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8B5E3C"/>
      <stop offset="30%"  stop-color="#7A4F2D"/>
      <stop offset="60%"  stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#6B3F1E"/>
    </linearGradient>
    <!-- Subtle grain streaks -->
    <linearGradient id="grain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00000000"/>
      <stop offset="20%"  stop-color="#00000015"/>
      <stop offset="40%"  stop-color="#00000000"/>
      <stop offset="65%"  stop-color="#00000020"/>
      <stop offset="100%" stop-color="#00000000"/>
    </linearGradient>
  </defs>

  <!-- Drop shadow behind board -->
  <rect x="16" y="20" width="480" height="216" rx="6" ry="6" fill="#00000044"/>

  <!-- Main board -->
  <rect x="12" y="12" width="488" height="216" rx="6" ry="6" fill="url(#wood)"/>
  <!-- Grain overlay -->
  <rect x="12" y="12" width="488" height="216" rx="6" ry="6" fill="url(#grain)"/>

  <!-- Dark border / frame -->
  <rect x="12" y="12" width="488" height="216" rx="6" ry="6"
        fill="none" stroke="#4A2800" stroke-width="6"/>

  <!-- Inner decorative rule lines -->
  <rect x="24" y="24" width="464" height="192" rx="3" ry="3"
        fill="none" stroke="#4A2800" stroke-width="2" opacity="0.6"/>

  <!-- Hanging rope hooks (left and right) -->
  <circle cx="80"  cy="12" r="8" fill="#5C3A1E" stroke="#3A1E00" stroke-width="2"/>
  <circle cx="432" cy="12" r="8" fill="#5C3A1E" stroke="#3A1E00" stroke-width="2"/>
  <!-- Rope lines upward -->
  <line x1="80"  y1="4"  x2="80"  y2="0"  stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
  <line x1="432" y1="4"  x2="432" y2="0"  stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>

  <!-- Text: line 1 -->
  <text x="256" y="88"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="36" font-style="italic"
        fill="#F5DEB3"
        text-anchor="middle"
        letter-spacing="1">A Vibe Coded House</text>

  <!-- Decorative divider -->
  <line x1="120" y1="108" x2="392" y2="108" stroke="#D4A855" stroke-width="1.5" opacity="0.8"/>
  <text x="256" y="116" font-family="Georgia, serif" font-size="14"
        fill="#D4A855" text-anchor="middle" dominant-baseline="middle" opacity="0.9">✦ ✦ ✦</text>
  <line x1="120" y1="124" x2="392" y2="124" stroke="#D4A855" stroke-width="1.5" opacity="0.8"/>

  <!-- Text: line 2 -->
  <text x="256" y="157"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="26"
        fill="#F5DEB3"
        text-anchor="middle"
        letter-spacing="2">by</text>

  <!-- Text: line 3 -->
  <text x="256" y="197"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="38" font-weight="bold"
        fill="#FFD700"
        text-anchor="middle"
        letter-spacing="2">WackyIraqi</text>
</svg>
